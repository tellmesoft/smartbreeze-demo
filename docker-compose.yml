services:
  postgres:
    image: postgres:16-alpine
    container_name: smartbreeze_demo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartbreeze_demo
    ports:
      - "5432:5432"
    volumes:
      - smartbreeze_pgdata:/var/lib/postgresql/data

volumes:
  smartbreeze_pgdata:
